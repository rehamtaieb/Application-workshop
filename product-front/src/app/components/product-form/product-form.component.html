<h2>Add Product</h2>

<form (ngSubmit)="saveProduct()">

  <label>Name:</label>
  <input type="text" [(ngModel)]="product.name" name="name">

  <br><br>

  <label>Price:</label>
  <input type="number" [(ngModel)]="product.price" name="price">

  <br><br>

  <button type="submit">Save</button>

</form>
